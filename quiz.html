<style>
.topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-md);
    padding: var(--space-sm) var(--space-lg);
    background: var(--ink);
    border-bottom: 1px solid var(--ink-line);
}

.case-tab {
    display: flex;
    align-items: baseline;
    gap: var(--space-2xs);
    font-family: var(--font-display);
    color: var(--text-on-dark);
}
.case-icon { font-size: 1.1rem; }
.case-title { font-weight: 700; letter-spacing: -0.01em; }
.case-id {
    font-size: 0.68rem;
    color: var(--text-on-dark-muted);
    letter-spacing: 0.05em;
    display: none;
}
@media (min-width: 640px) {
    .case-id { display: inline; }
}

/* --- NAVIGASI UTAMA --- */
.topbar nav {
    display: flex;
    align-items: center;
    gap: var(--space-lg);
}

.topbar ul {
    display: flex;
    flex-direction: row; /* Mutlak ke samping */
    list-style-type: none !important; /* Menghapus titik/bullet */
    padding: 0;
    margin: 0;
    gap: 15px; /* Jarak antar menu */
}

/* Base style untuk tombol menu */
.topbar ul a {
    display: block;
    font-family: var(--font-display);
    font-size: 0.8rem;
    color: var(--text-on-dark-muted);
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    text-decoration: none;
    font-weight: 600;
    background: transparent;
    position: relative;
    overflow: hidden;
    z-index: 1;
    transition: all 0.35s ease;
}

/* Efek kotak tersembunyi (Sweep Animasi) */
.topbar ul a::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background-color: rgba(226,162,59,0.15); /* Warna amber transparan khas cyber */
    z-index: -1;
    transition: all 0.4s cubic-bezier(0.77, 0, 0.175, 1);
}

/* Saat di-hover */
.topbar ul a:hover::before {
    left: 0;
}

.topbar ul a:hover {
    color: var(--amber); /* Teks berubah terang */
    padding-left: 22px; /* Teks maju sedikit ke kanan memberikan feel responsif */
}

.btn-start {
    font-family: var(--font-display);
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--ink);
    background: var(--amber);
    padding: 0.55rem 1.1rem;
    border-radius: var(--radius-sm);
    transition: transform 0.2s var(--ease), background 0.2s var(--ease);
    white-space: nowrap;
}
.btn-start:hover { background: #EDB661; transform: translateY(-1px); }

/* Mode HP */
@media (max-width: 720px) {
    .topbar { flex-wrap: wrap; padding: var(--space-sm); }
    .topbar ul { display: none; }
}
</style>
</head>
